<!doctype html>
<html lang="lo">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ບໍ່ມີການເຊື່ອມຕໍ່ອິນເຕີເນັດ - POS & Stock</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Noto Sans Lao", -apple-system, BlinkMacSystemFont, sans-serif;
        min-height: 100vh; display: flex; align-items: center; justify-content: center;
        background: #f8f9fa; padding: 20px;
      }
      .container { text-align: center; max-width: 400px; }
      .icon { width: 80px; height: 80px; margin: 0 auto 24px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; }
      h1 { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 12px; }
      p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 24px; }
      .btn { display: inline-block; padding: 12px 28px; background: #0ea5e9; color: white; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none; }
      .btn:hover { background: #0284c7; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>ບໍ່ມີການເຊື່ອມຕໍ່ອິນເຕີເນັດ</h1>
      <p>ກະລຸນາກວດສອບການເຊື່ອມຕໍ່ອິນເຕີເນັດ ແລ້ວລອງໃໝ່ອີກຄັ້ງ.</p>
      <button class="btn" onclick="window.location.reload()">ລອງໃໝ່</button>
    </div>
  </body>
</html>
